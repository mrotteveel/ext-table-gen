name: Publish documentation and artifacts for tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]'
      - 'v[0-9]+.[0-9]-*'

permissions:
  contents: read

jobs:
  create-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Assemble with Gradle
        run: ./gradlew assemble
      - name: Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-artifact
          path: build/docs/asciidoc
          compression-level: 9
          retention-days: 1
      - name: Distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: distribution-artifact
          path: build/distributions
          compression-level: 0
          retention-days: 1
  publish-pages:
    runs-on: ubuntu-latest
    needs: [ create-artifacts ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Get pages artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-artifact
          path: pages
      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          branch: gh-pages
          folder: pages
  create-release:
    runs-on: ubuntu-latest
    needs: [ create-artifacts ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Get distribution artifact
        uses: actions/download-artifact@v8
        with:
          name: distribution-artifact
          path: dist
      - name: Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          artifacts: dist/*.zip
          artifactContentType: application/x-zip-compressed
          draft: true
          name: "ext-table-gen ${{ github.ref_name }}"
